<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ระบบทดสอบดันพื้น 30 วินาที</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <h1>การทดสอบดันพื้น 30 วินาที</h1>
  <p>ระบบนับอัตโนมัติ</p>
</header>

<section class="panel">
  <div class="timer">เวลา<br><span id="timer">30</span></div>
  <div class="count">จำนวนครั้ง<br><span id="count">0</span></div>
</section>

<section class="status">
  <div id="result">รอเริ่มทดสอบ</div>
</section>

<button id="startBtn">เริ่มทดสอบ</button>

<script type="module" src="app.js"></script>
</body>
</html>
